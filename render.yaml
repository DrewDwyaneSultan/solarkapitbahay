# Fallback backend host if Vercel Services is unavailable on your account.
# Deploy at https://render.com → New Blueprint → connect this repo.
# Then set VITE_API_URL in Vercel to the Render URL (e.g. https://solarkapitbahay-api.onrender.com).

services:
  - type: web
    name: solarkapitbahay-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      # Set in Render dashboard after creating a Supabase project (see docs/DEPLOY_DEMO.md)
      - key: DATABASE_URL
        sync: false
